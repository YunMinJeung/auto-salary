<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>오프라인</title>
<style>
body{margin:0;font-family:sans-serif;display:flex;flex-direction:column;
     align-items:center;justify-content:center;min-height:100dvh;
     background:#003844;color:#fff;text-align:center;padding:24px}
.icon{font-size:60px;margin-bottom:16px}
h1{font-size:1.4rem;margin:0 0 8px}
p{opacity:.75;font-size:.9rem;margin:0 0 24px}
button{padding:12px 28px;border-radius:12px;border:none;
       background:#FFB100;color:#003844;font-weight:700;font-size:1rem;cursor:pointer}
</style>
</head>
<body>
<div class="icon">📡</div>
<h1>인터넷 연결 없음</h1>
<p>네트워크를 확인하고 다시 시도하세요.<br>출퇴근 기록은 온라인 상태에서만 가능합니다.</p>
<button onclick="location.reload()">다시 시도</button>
</body>
</html>
